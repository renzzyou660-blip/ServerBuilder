name: Web2APK

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
      app_name:
        description: 'Nama Aplikasi'
        required: true
      icon_url:
        description: 'Icon Url'
        required: true
      flutter_version:
        description: 'Versi Flutter (kosongkan = 3.27.0)'
        required: false
        default: '3.27.0'
      package_name:
        description: 'Package name (kosongkan = auto dari app_name)'
        required: false
        default: 'auto'
      status_bar_color:
        description: 'Status bar color hex (kosongkan = transparent)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '${{ github.event.inputs.flutter_version }}'
          channel: stable
          cache: true

      - name: Create Flutter Project
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          REQUESTED_PKG="${{ github.event.inputs.package_name }}"

          if [ "$REQUESTED_PKG" != "auto" ] && [ -n "$REQUESTED_PKG" ]; then
            PKG="$REQUESTED_PKG"
          else
            PKG=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd '[:alnum:]_')
          fi

          echo "App name: $APP_NAME"
          echo "Package: $PKG"

          flutter create --org com.webapk --project-name "$PKG" myapp

      - name: Add Dependencies
        run: |
          cd myapp
          flutter pub add webview_flutter
          flutter pub add flutter_launcher_icons
          flutter pub add connectivity_plus

          echo "  assets:" >> pubspec.yaml
          echo "    - assets/icon/" >> pubspec.yaml

      - name: Write main.dart
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          WEB_URL="${{ github.event.inputs.web_url }}"
          STATUS_COLOR="${{ github.event.inputs.status_bar_color }}"

          if [ -z "$STATUS_COLOR" ]; then
            STATUS_BAR_LINE='statusBarColor: Colors.transparent,'
          else
            STATUS_BAR_LINE="statusBarColor: const Color(0xFF${STATUS_COLOR}),"
          fi

          cat > myapp/lib/main.dart << 'DART_EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:connectivity_plus/connectivity_plus.dart';
          import 'dart:async';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setSystemUIOverlayStyle(const SystemUiOverlayStyle(
              __STATUS_BAR_COLOR__
              statusBarIconBrightness: Brightness.dark,
            ));
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '__APP_NAME__',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(useMaterial3: true, primarySwatch: Colors.blue),
                home: const SplashScreen(),
              );
            }
          }

          class SplashScreen extends StatefulWidget {
            const SplashScreen({super.key});
            @override
            State<SplashScreen> createState() => _SplashScreenState();
          }

          class _SplashScreenState extends State<SplashScreen>
              with TickerProviderStateMixin {
            late AnimationController _fadeController;
            late AnimationController _scaleController;
            late AnimationController _dotController;
            late Animation<double> _fadeAnim;
            late Animation<double> _scaleAnim;
            late Animation<double> _dot1Anim;
            late Animation<double> _dot2Anim;
            late Animation<double> _dot3Anim;

            bool _isChecking = false;
            bool _dialogShown = false;

            @override
            void initState() {
              super.initState();

              _fadeController = AnimationController(
                vsync: this,
                duration: const Duration(milliseconds: 800),
              );
              _scaleController = AnimationController(
                vsync: this,
                duration: const Duration(milliseconds: 800),
              );
              _dotController = AnimationController(
                vsync: this,
                duration: const Duration(milliseconds: 1200),
              )..repeat();

              _fadeAnim = Tween<double>(begin: 0.0, end: 1.0).animate(
                CurvedAnimation(parent: _fadeController, curve: Curves.easeOut),
              );
              _scaleAnim = Tween<double>(begin: 0.75, end: 1.0).animate(
                CurvedAnimation(parent: _scaleController, curve: Curves.easeOutBack),
              );

              _dot1Anim = TweenSequence([
                TweenSequenceItem(tween: Tween<double>(begin: 0.3, end: 1.0), weight: 1),
                TweenSequenceItem(tween: Tween<double>(begin: 1.0, end: 0.3), weight: 1),
                TweenSequenceItem(tween: ConstantTween<double>(0.3), weight: 1),
              ]).animate(CurvedAnimation(parent: _dotController, curve: Curves.easeInOut));

              _dot2Anim = TweenSequence([
                TweenSequenceItem(tween: ConstantTween<double>(0.3), weight: 1),
                TweenSequenceItem(tween: Tween<double>(begin: 0.3, end: 1.0), weight: 1),
                TweenSequenceItem(tween: Tween<double>(begin: 1.0, end: 0.3), weight: 1),
              ]).animate(CurvedAnimation(parent: _dotController, curve: Curves.easeInOut));

              _dot3Anim = TweenSequence([
                TweenSequenceItem(tween: Tween<double>(begin: 1.0, end: 0.3), weight: 1),
                TweenSequenceItem(tween: ConstantTween<double>(0.3), weight: 1),
                TweenSequenceItem(tween: Tween<double>(begin: 0.3, end: 1.0), weight: 1),
              ]).animate(CurvedAnimation(parent: _dotController, curve: Curves.easeInOut));

              _fadeController.forward();
              _scaleController.forward();

              Timer(const Duration(milliseconds: 1500), () {
                _checkConnectionAndNavigate();
              });
            }

            Future<void> _checkConnectionAndNavigate() async {
              if (_isChecking) return;
              setState(() {
                _isChecking = true;
              });

              await Future.delayed(const Duration(milliseconds: 1000));

              var connectivityResult = await (Connectivity().checkConnectivity());
              if (connectivityResult.every((r) => r == ConnectivityResult.none)) {
                setState(() {
                  _isChecking = false;
                });
                _showNoConnectionDialog();
              } else {
                if (mounted) {
                  Navigator.pushReplacement(
                    context,
                    PageRouteBuilder(
                      transitionDuration: const Duration(milliseconds: 500),
                      pageBuilder: (_, __, ___) => const WebViewPage(),
                      transitionsBuilder: (_, anim, __, child) =>
                          FadeTransition(opacity: anim, child: child),
                    ),
                  );
                }
              }
            }

            void _showNoConnectionDialog() {
              if (!mounted || _dialogShown) return;
              setState(() {
                _dialogShown = true;
              });
              showDialog(
                context: context,
                barrierDismissible: false,
                builder: (context) => AlertDialog(
                  shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(16)),
                  title: const Row(
                    children: [
                      Icon(Icons.wifi_off, color: Colors.red),
                      SizedBox(width: 8),
                      Text('Gagal Terhubung'),
                    ],
                  ),
                  content: const Text(
                    'Tidak ada koneksi internet. Periksa jaringan kamu dan coba lagi.',
                  ),
                  actions: [
                    TextButton(
                      onPressed: () {
                        Navigator.pop(context);
                        setState(() {
                          _dialogShown = false;
                        });
                        _checkConnectionAndNavigate();
                      },
                      child: const Text('Coba Lagi'),
                    ),
                  ],
                ),
              );
            }

            @override
            void dispose() {
              _fadeController.dispose();
              _scaleController.dispose();
              _dotController.dispose();
              super.dispose();
            }

            Widget _buildDot(Animation<double> anim, Color color) {
              return AnimatedBuilder(
                animation: anim,
                builder: (_, __) => Opacity(
                  opacity: anim.value,
                  child: Container(
                    width: 8,
                    height: 8,
                    decoration: BoxDecoration(color: color, shape: BoxShape.circle),
                  ),
                ),
              );
            }

            @override
            Widget build(BuildContext context) {
              final size = MediaQuery.of(context).size;
              return Scaffold(
                body: Container(
                  width: size.width,
                  height: size.height,
                  decoration: const BoxDecoration(
                    gradient: LinearGradient(
                      begin: Alignment.topLeft,
                      end: Alignment.bottomRight,
                      colors: [Color(0xFFf0f4ff), Color(0xFFe8f5e9)],
                    ),
                  ),
                  child: FadeTransition(
                    opacity: _fadeAnim,
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        const Spacer(flex: 3),
                        ScaleTransition(
                          scale: _scaleAnim,
                          child: Container(
                            width: 140,
                            height: 140,
                            decoration: BoxDecoration(
                              borderRadius: BorderRadius.circular(32),
                              boxShadow: [
                                BoxShadow(
                                  color: Colors.black.withOpacity(0.15),
                                  blurRadius: 30,
                                  offset: const Offset(0, 10),
                                ),
                              ],
                            ),
                            child: ClipRRect(
                              borderRadius: BorderRadius.circular(32),
                              child: Image.asset(
                                'assets/icon/icon.png',
                                fit: BoxFit.cover,
                                errorBuilder: (_, __, ___) =>
                                    const Icon(Icons.android, size: 80, color: Colors.green),
                              ),
                            ),
                          ),
                        ),
                        const SizedBox(height: 28),
                        Text(
                          '__APP_NAME__',
                          style: const TextStyle(
                            fontSize: 26,
                            fontWeight: FontWeight.w700,
                            color: Color(0xFF1a1a2e),
                            letterSpacing: 0.5,
                          ),
                        ),
                        const Spacer(flex: 3),
                        Row(
                          mainAxisAlignment: MainAxisAlignment.center,
                          children: [
                            _buildDot(_dot1Anim, const Color(0xFF4A90E2)),
                            const SizedBox(width: 8),
                            _buildDot(_dot2Anim, const Color(0xFF4A90E2)),
                            const SizedBox(width: 8),
                            _buildDot(_dot3Anim, const Color(0xFF4A90E2)),
                          ],
                        ),
                        const SizedBox(height: 48),
                      ],
                    ),
                  ),
                ),
              );
            }
          }

          class WebViewPage extends StatefulWidget {
            const WebViewPage({super.key});
            @override
            State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> {
            late final WebViewController _controller;
            late final Connectivity _connectivity;
            StreamSubscription<List<ConnectivityResult>>? _connectivitySub;
            bool _dialogShown = false;

            @override
            void initState() {
              super.initState();
              _connectivity = Connectivity();
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(Colors.white)
                ..setNavigationDelegate(NavigationDelegate(
                  onWebResourceError: (error) {
                    if (error.isForMainFrame == true) _showNoConnectionDialog();
                  },
                ))
                ..loadRequest(Uri.parse('__WEB_URL__'));

              _connectivitySub = _connectivity.onConnectivityChanged.listen((results) {
                if (results.every((r) => r == ConnectivityResult.none)) {
                  _showNoConnectionDialog();
                }
              });
            }

            @override
            void dispose() {
              _connectivitySub?.cancel();
              super.dispose();
            }

            void _showNoConnectionDialog() {
              if (!mounted || _dialogShown) return;
              setState(() {
                _dialogShown = true;
              });
              showDialog(
                context: context,
                barrierDismissible: false,
                builder: (context) => AlertDialog(
                  shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(16)),
                  title: const Row(
                    children: [
                      Icon(Icons.wifi_off, color: Colors.red),
                      SizedBox(width: 8),
                      Text('Gagal Terhubung'),
                    ],
                  ),
                  content: const Text(
                    'Tidak ada koneksi internet. Periksa jaringan kamu dan coba lagi.',
                  ),
                  actions: [
                    TextButton(
                      onPressed: () {
                        Navigator.pop(context);
                        setState(() {
                          _dialogShown = false;
                        });
                        _controller.reload();
                      },
                      child: const Text('Coba Lagi'),
                    ),
                  ],
                ),
              );
            }

            @override
            Widget build(BuildContext context) {
              return PopScope(
                canPop: false,
                onPopInvoked: (didPop) async {
                  if (didPop) return;
                  if (await _controller.canGoBack()) {
                    await _controller.goBack();
                  } else {
                    SystemNavigator.pop();
                  }
                },
                child: Scaffold(
                  body: SafeArea(
                    child: WebViewWidget(controller: _controller),
                  ),
                ),
              );
            }
          }
          DART_EOF

          # Replace placeholders — use # as delimiter to avoid conflict with URLs containing /
          sed -i "s#__APP_NAME__#$APP_NAME#g" myapp/lib/main.dart
          sed -i "s#__WEB_URL__#$WEB_URL#g" myapp/lib/main.dart
          sed -i "s#__STATUS_BAR_COLOR__#$STATUS_BAR_LINE#g" myapp/lib/main.dart

      - name: Fix Android Permissions and App Name
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          MANIFEST="myapp/android/app/src/main/AndroidManifest.xml"

          sed -i '/<manifest xmlns:android/a\    <uses-permission android:name="android.permission.INTERNET"\/>' "$MANIFEST"
          sed -i '/<manifest xmlns:android/a\    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>' "$MANIFEST"
          sed -i "s/android:label=\"[^\"]*\"/android:label=\"$APP_NAME\"/" "$MANIFEST"

      - name: Setup Network Security (Allow HTTP)
        run: |
          mkdir -p myapp/android/app/src/main/res/xml
          cat > myapp/android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system"/>
              </trust-anchors>
            </base-config>
          </network-security-config>
          EOF

          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' \
            myapp/android/app/src/main/AndroidManifest.xml

      - name: Download and Sanitize Icon
        run: |
          mkdir -p myapp/assets/icon
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick > /dev/null 2>&1

          ICON_RAW="myapp/assets/icon/icon_raw"
          ICON_PNG="myapp/assets/icon/icon.png"

          HTTP_CODE=$(curl -s -o "$ICON_RAW" -w "%{http_code}" \
            -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.icon_url }}")

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "WARNING: Icon download returned HTTP $HTTP_CODE, using default Android icon"
            rm -f "$ICON_RAW"
          fi

          if [ -f "$ICON_RAW" ]; then
            # Detect actual file type and convert to valid PNG
            FILE_TYPE=$(file -b "$ICON_RAW" | head -1)
            echo "Icon file type: $FILE_TYPE"

            if ! convert "$ICON_RAW" \
              -background transparent \
              -gravity center \
              -resize 1024x1024 \
              -extent 1024x1024 \
              "$ICON_PNG" 2>/dev/null; then
              echo "WARNING: ImageMagick convert failed, trying with -define options"
              convert "$ICON_RAW" \
                -define png:color-type=6 \
                -background transparent \
                -gravity center \
                -resize 1024x1024 \
                -extent 1024x1024 \
                "$ICON_PNG" 2>/dev/null || {
                  echo "WARNING: Icon conversion failed, will use default Android icon"
                  rm -f "$ICON_RAW" "$ICON_PNG"
                }
            fi

            # Verify the output is a valid PNG
            if [ -f "$ICON_PNG" ]; then
              if ! file "$ICON_PNG" | grep -q "PNG image data"; then
                echo "WARNING: Output is not a valid PNG, removing"
                rm -f "$ICON_PNG"
              fi
            fi
          fi

          # Cleanup raw file
          rm -f "$ICON_RAW"

      - name: Write launcher icons config
        run: |
          cat > myapp/flutter_launcher_icons.yaml << 'EOF'
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon/icon.png"
            min_sdk_android: 21
          EOF

      - name: Generate Icons
        run: |
          cd myapp
          if [ -f "assets/icon/icon.png" ]; then
            dart run flutter_launcher_icons -f flutter_launcher_icons.yaml
          else
            echo "No icon.png found, skipping icon generation (will use Flutter default)"
            # Create empty placeholder so assets don't fail
            mkdir -p assets/icon
          fi

      - name: Build APK
        run: |
          cd myapp
          flutter build apk --release

      - name: Find and Upload APK
        run: |
          APK_FOUND=$(find myapp/build/app/outputs -name "*.apk" -type f | head -n 1)

          if [ -z "$APK_FOUND" ]; then
            # Broader fallback search
            APK_FOUND=$(find . -name "*.apk" ! -path "*/.gradle/*" -type f | head -n 1)
          fi

          if [ -z "$APK_FOUND" ]; then
            echo "ERROR: APK not found after build!"
            exit 1
          fi

          echo "APK found: $APK_FOUND"
          ls -lh "$APK_FOUND"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-release
          path: myapp/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
