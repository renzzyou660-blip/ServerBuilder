name: Build Android Studio APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP project Android Studio (GitHub Release asset API URL)'
        required: true
      tag:
        description: 'Tag untuk release'
        required: true
      build_type:
        description: 'Tipe build: debug atau release'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download ZIP project
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            -o project.zip \
            "${{ github.event.inputs.zip_url }}"
          echo "ZIP downloaded: $(du -sh project.zip | cut -f1)"

      - name: Extract ZIP
        run: |
          unzip -o project.zip -d project_src
          echo "Contents:"
          ls -la project_src/

      - name: Find project root
        id: find_root
        run: |
          # Find the directory that contains build.gradle or build.gradle.kts
          ROOT=$(find project_src -maxdepth 3 \( -name "build.gradle" -o -name "build.gradle.kts" \) ! -path "*/app/*" | head -1 | xargs dirname 2>/dev/null || echo "")
          if [ -z "$ROOT" ]; then
            # Fallback: use the first subdirectory if zip extracted into a folder
            FIRST=$(ls -d project_src/*/ 2>/dev/null | head -1)
            ROOT="${FIRST:-project_src}"
          fi
          echo "Project root: $ROOT"
          echo "root=$ROOT" >> $GITHUB_OUTPUT
          ls -la "$ROOT/"

      - name: Grant gradlew permission
        run: |
          ROOT="${{ steps.find_root.outputs.root }}"
          if [ -f "$ROOT/gradlew" ]; then
            chmod +x "$ROOT/gradlew"
          else
            echo "gradlew not found, will use gradle wrapper download"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (${{ github.event.inputs.build_type }})
        run: |
          ROOT="${{ steps.find_root.outputs.root }}"
          cd "$ROOT"
          BUILD_TYPE="${{ github.event.inputs.build_type }}"

          if [ -f "gradlew" ]; then
            GRADLE_CMD="./gradlew"
          else
            GRADLE_CMD="gradle"
          fi

          if [ "$BUILD_TYPE" = "debug" ]; then
            $GRADLE_CMD assembleDebug --no-daemon --stacktrace
          else
            $GRADLE_CMD assembleRelease --no-daemon --stacktrace
          fi

      - name: Find APK output
        id: find_apk
        run: |
          ROOT="${{ steps.find_root.outputs.root }}"
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ "$BUILD_TYPE" = "debug" ]; then
            APK=$(find "$ROOT" -name "*debug*.apk" | head -1)
          else
            APK=$(find "$ROOT" -name "*release*.apk" | head -1)
          fi
          if [ -z "$APK" ]; then
            APK=$(find "$ROOT" -name "*.apk" | head -1)
          fi
          echo "APK found: $APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.event.inputs.tag }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 1
